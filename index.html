<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>N64 Wasm - Modern Emulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* Styles omitted for brevity (use the previous styles) */
  </style>
</head>
<body>
  <label class="toggle-switch" title="Toggle Dark Mode">
    <input type="checkbox" id="darkModeToggle" />
    <span class="slider"></span>
    Dark Mode
  </label>

  <div class="container">
    <h1>N64 Wasm Emulator</h1>

    <div class="controls">
      <button class="btn" id="btnUploadRom">Browse ROM</button>
      <input type="file" id="fileInput" accept=".n64,.z64,.v64" style="display:none" />
      
      <button class="btn" id="btnPlayGame" disabled>Play Game</button>
      <button class="btn" id="btnRemap">Remap Buttons</button>
      <select id="romSelect" disabled>
        <option value="">No ROM loaded</option>
      </select>
    </div>

    <div id="canvasDiv" style="display:none;">
      <canvas id="canvas" width="640" height="480"></canvas>
    </div>

    <div class="controls" style="justify-content:center; margin-top: 20px;">
      <button class="btn" id="btnZoomOut" disabled>Zoom Out</button>
      <button class="btn" id="btnZoomIn" disabled>Zoom In</button>
      <button class="btn" id="btnFullscreen" disabled>Full Screen</button>
    </div>
  </div>

  <script>
    // Dark mode toggle handler (as before)
    const darkToggle = document.getElementById('darkModeToggle');
    const body = document.body;
    if(localStorage.getItem('darkMode') === 'true') {
      body.classList.add('dark');
      darkToggle.checked = true;
    }
    darkToggle.addEventListener('change', () => {
      if(darkToggle.checked) {
        body.classList.add('dark');
        localStorage.setItem('darkMode', 'true');
      } else {
        body.classList.remove('dark');
        localStorage.setItem('darkMode', 'false');
      }
    });

    // File input and buttons
    const btnUploadRom = document.getElementById('btnUploadRom');
    const fileInput = document.getElementById('fileInput');
    const btnPlay = document.getElementById('btnPlayGame');
    const romSelect = document.getElementById('romSelect');
    const canvasDiv = document.getElementById('canvasDiv');

    btnUploadRom.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (event) => {
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const fileName = file.name;

        // Enable play button
        btnPlay.disabled = false;
        // Enable romSelect and update options with selected file
        romSelect.disabled = false;
        romSelect.innerHTML = `<option selected value="${fileName}">${fileName}</option>`;

        // Optionally store the file for emulator loading here
        // e.g., save to a variable or pass to your emulator logic
        window.selectedRomFile = file; // example storage

        // Hide canvas until Play is clicked
        canvasDiv.style.display = 'none';
      }
    });

    btnPlay.addEventListener('click', () => {
      // Make sure a ROM file is selected (from file input)
      if (window.selectedRomFile) {
        alert('Starting emulator with ROM: ' + window.selectedRomFile.name);
        // Show canvas for emulator output
        canvasDiv.style.display = 'block';

        // TODO: Pass the selectedRomFile to emulator loader logic here
      } else {
        alert('Please select a ROM file first!');
      }
    });
  </script>
</body>
</html>
