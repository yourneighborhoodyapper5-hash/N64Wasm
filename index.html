<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>N64 Wasm - Modern Emulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-bg-light: #f0f2f5;
      --color-bg-dark: #121212;
      --color-primary: #4a90e2;
      --color-primary-dark: #357ABD;
      --color-text-light: #333;
      --color-text-dark: #eee;
      --transition-speed: 0.3s;
    }
    /* Reset & base */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }
    body {
      background-color: var(--color-bg-light);
      color: var(--color-text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      transition: background-color var(--transition-speed), color var(--transition-speed);
    }
    body.dark {
      background-color: var(--color-bg-dark);
      color: var(--color-text-dark);
    }

    /* Container */
    .container {
      width: 100%;
      max-width: 720px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 40px 30px;
      transition: background var(--transition-speed), color var(--transition-speed);
    }
    body.dark .container {
      background: #1e1e1e;
      box-shadow: 0 10px 30px rgba(255,255,255,0.05);
      color: var(--color-text-dark);
    }

    /* Heading */
    h1 {
      font-weight: 700;
      font-size: 2.5rem;
      margin-bottom: 25px;
      text-align: center;
      color: inherit;
    }

    /* Button styles */
    .btn {
      background-color: var(--color-primary);
      border: none;
      color: white;
      font-weight: 600;
      padding: 14px 28px;
      margin: 10px 5px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(74,144,226,0.4);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      font-size: 1rem;
      min-width: 140px;
    }
    .btn:hover {
      background-color: var(--color-primary-dark);
      box-shadow: 0 8px 16px rgba(53,122,189,0.6);
    }
    .btn:disabled {
      background-color: #a0aec0;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Controls panel */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }

    /* Select dropdown */
    select {
      padding: 12px 16px;
      margin: 10px 5px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 1rem;
      min-width: 220px;
      cursor: pointer;
      transition: border-color 0.3s ease;
    }
    select:focus {
      border-color: var(--color-primary);
      outline: none;
    }

    /* Canvas container */
    #canvasDiv {
      margin: 40px auto 20px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      border-radius: 16px;
      overflow: hidden;
      background: black;
    }
    #canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Toggle switch for dark mode */
    .toggle-switch {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
      font-size: 0.9rem;
      color: var(--color-text-light);
      transition: color var(--transition-speed);
    }
    body.dark .toggle-switch {
      color: var(--color-text-dark);
    }
    .toggle-switch input {
      display: none;
    }
    .slider {
      position: relative;
      width: 50px;
      height: 26px;
      background: #ccc;
      border-radius: 13px;
      margin-right: 10px;
      transition: background-color 0.3s ease;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      top: 2px;
      left: 2px;
      transition: transform 0.3s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    input:checked + .slider {
      background: var(--color-primary);
    }
    input:checked + .slider::before {
      transform: translateX(24px);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .btn {
        min-width: 100%;
        margin: 8px 0;
      }
      select {
        min-width: 100%;
      }
      .container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <label class="toggle-switch" title="Toggle Dark Mode">
    <input type="checkbox" id="darkModeToggle" />
    <span class="slider"></span>
    Dark Mode
  </label>

  <div class="container">
    <h1>N64 Wasm Emulator</h1>

    <div class="controls">
      <button class="btn" id="btnUploadRom">Browse ROM</button>
      <button class="btn" id="btnPlayGame" disabled>Play Game</button>
      <button class="btn" id="btnRemap">Remap Buttons</button>
      <select id="romSelect" disabled>
        <option value="">Select a ROM</option>
      </select>
    </div>

    <div id="canvasDiv" style="display:none;">
      <canvas id="canvas" width="640" height="480"></canvas>
    </div>

    <div class="controls" style="justify-content:center; margin-top: 20px;">
      <button class="btn" id="btnZoomOut" disabled>Zoom Out</button>
      <button class="btn" id="btnZoomIn" disabled>Zoom In</button>
      <button class="btn" id="btnFullscreen" disabled>Full Screen</button>
    </div>
  </div>

  <script>
    // Dark mode toggle handler
    const darkToggle = document.getElementById('darkModeToggle');
    const body = document.body;
    // Load saved preference
    if(localStorage.getItem('darkMode') === 'true') {
      body.classList.add('dark');
      darkToggle.checked = true;
    }
    darkToggle.addEventListener('change', () => {
      if(darkToggle.checked) {
        body.classList.add('dark');
        localStorage.setItem('darkMode', 'true');
      } else {
        body.classList.remove('dark');
        localStorage.setItem('darkMode', 'false');
      }
    });

    // Placeholder for enabling buttons / loading ROMs
    const btnPlay = document.getElementById('btnPlayGame');
    const romSelect = document.getElementById('romSelect');
    const btnUploadRom = document.getElementById('btnUploadRom');

    btnUploadRom.onclick = () => {
      // Simulate ROM loaded - enable play button
      btnPlay.disabled = false;
      romSelect.disabled = false;
      romSelect.innerHTML = `<option value="rom1.n64">Super Mario 64</option>
                             <option value="rom2.n64">The Legend of Zelda</option>`;
    };

    btnPlay.onclick = () => {
      alert('Starting the emulator with selected ROM: ' + romSelect.value);
      document.getElementById('canvasDiv').style.display = 'block';
    };
  </script>
</body>
</html>
